name: Android CI - Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        id: setup-java
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify Java
        run: java -version

      - name: Install Android SDK commandline tools
        run: |
          sudo mkdir -p /opt/android-sdk/cmdline-tools
          curl -sSL -o cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q cmdline.zip -d /tmp/cmdline
          sudo mv /tmp/cmdline/cmdline-tools /opt/android-sdk/cmdline-tools/latest
          echo "sdk.dir=/opt/android-sdk" > local.properties
          sudo chown -R $USER:$USER /opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=${ANDROID_SDK_ROOT} --sdk_root=${ANDROID_SDK_ROOT} --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=${ANDROID_SDK_ROOT} --licenses

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}-${{ hashFiles('**/*.gradle*') }}

      - name: Build debug APK
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
          ANDROID_SDK_ROOT: /opt/android-sdk
        run: |
          chmod +x ./gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
